[tool.ruff]
line-length = 120
target-version = "py38"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "B", "ANN"]

[tool.ruff.lint.per-file-ignores]
"venus-os/mqtt-grid-meter/test_mqtt_grid_meter.py" = ["E402"]

[tool.pyrefly]
project-includes = ["venus-os/mqtt-grid-meter"]
search-path = ["venus-os/mqtt-grid-meter"]
python-version = "3.8"
python-platform = "linux"
skip-interpreter-query = true
ignore-missing-imports = ["dbus.*", "gi.*", "vedbus"]

[tool.pytest.ini_options]
testpaths = ["venus-os/mqtt-grid-meter"]
