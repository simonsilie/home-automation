title: Energie Steuerung
views:
  - title: Energie Monitor
    path: energie-steuerung
    icon: mdi:transmission-tower
    cards:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.electric_meter_ir_active_power
            name: Netzleistung
            min: -2000
            max: 4000
            severity:
              green: -2000
              yellow: 10
              red: 500
          - type: gauge
            entity: sensor.opendtu_91fd98_ac_power
            name: PV-Leistung
            min: 0
            max: 3000
            severity:
              green: 0
              yellow: 1200
              red: 2400
          - type: gauge
            entity: sensor.soyosource_victron_esp32_mppt_panel_power
            name: Batterie Eingangsleistung
            min: 0
            max: 1500
            severity:
              green: 0
              yellow: 600
              red: 1200
          - type: gauge
            entity: sensor.soyosource_aktive_sollleistung
            name: Batterie Ausgangsleistung
            min: 0
            max: 1500
            severity:
              green: 0
              yellow: 600
              red: 1200
          - type: tile
            entity: sensor.soyosource_reglerstatus
            name: Feed-in-Control Status
            color: primary
          - type: tile
            entity: sensor.rd6030_reglerstatus
            name: RD6030 Ueberschussladen Status
            color: primary

      - type: entities
        title: Wechselrichter Steuerung
        show_header_toggle: false
        entities:
          - entity: switch.soyosource_victron_esp32_limiter_manual_mode
            name: Handbetrieb
          - entity: number.soyosource_victron_esp32_manual_power_demand
            name: Manuelle Sollleistung
          - entity: number.soyosource_victron_esp32_max_power_demand
            name: Maximale Sollleistung
          - entity: sensor.soyosource_victron_esp32_limiter_power_demand
            name: Automatische Sollleistung ESPHome

      - type: entities
        title: Feed-in-Control Bedienung
        show_header_toggle: false
        entities:
          - entity: input_boolean.soyosource_feed_in_control_enabled
            name: HA-Regler aktiv
          - entity: input_boolean.soyosource_feed_in_fail_safe_zero
            name: Fail-safe auf 0 W
          - entity: input_number.soyosource_feed_in_target_power
            name: Netzleistungsziel
          - entity: input_number.soyosource_feed_in_deadband
            name: Totband
          - entity: input_number.soyosource_feed_in_gain
            name: Regler Verstaerkung
          - entity: input_number.soyosource_feed_in_max_step
            name: Maximaler Stellschritt
          - entity: input_number.soyosource_feed_in_settle_time
            name: Beruhigungszeit
          - entity: input_number.soyosource_feed_in_low_battery_voltage
            name: Batterie Unterspannungsgrenze
          - entity: input_number.soyosource_feed_in_stale_timeout
            name: Messwert-Timeout
          - entity: input_text.soyosource_feed_in_meter_entity
            name: Zaehler-Entity

      - type: entities
        title: Feed-in-Control Diagnose
        show_header_toggle: false
        state_color: true
        entities:
          - entity: sensor.soyosource_netzleistung_direkt
            name: Netzleistung direkt
          - entity: sensor.soyosource_netzleistung_mittelwert
            name: Netzleistung Mittelwert
          - entity: sensor.soyosource_regeldifferenz
            name: Regeldifferenz
          - entity: sensor.soyosource_naechste_sollleistung
            name: Naechste Sollleistung
          - entity: sensor.soyosource_victron_esp32_mppt_battery_voltage
            name: Batterie Spannung
          - entity: binary_sensor.soyosource_messwert_frisch
            name: Messwert frisch
          - entity: binary_sensor.soyosource_batterie_niedrig
            name: Batterie niedrig
          - entity: binary_sensor.soyosource_regler_im_totband
            name: Im Totband
          - entity: binary_sensor.soyosource_regler_am_maximum
            name: Am Maximum
          - entity: binary_sensor.soyosource_regler_am_minimum
            name: Am Minimum
          - entity: binary_sensor.soyosource_ziel_nicht_erreichbar
            name: Ziel nicht erreichbar

      - type: history-graph
        title: Leistung letzte 2 Stunden
        hours_to_show: 2
        refresh_interval: 30
        entities:
          - entity: sensor.electric_meter_ir_active_power
            name: Netz
          - entity: sensor.opendtu_91fd98_ac_power
            name: PV
          - entity: number.soyosource_victron_esp32_manual_power_demand
            name: WR Sollleistung

      - type: entities
        title: RD6030 Ueberschussladen Bedienung
        show_header_toggle: false
        state_color: true
        entities:
          - entity: input_boolean.rd6030_battery_surplus_charge_enabled
            name: RD6030 Ueberschussladen aktiv
          - entity: input_boolean.rd6030_battery_surplus_fail_safe_zero
            name: Fail-safe auf 0 A
          - entity: switch.rd6030_output_enable
            name: RD6030 Ausgang
          - entity: number.rd6030_charge_voltage
            name: RD6030 Ladespannung aktiv
          - entity: number.rd6030_charge_current
            name: RD6030 Ladestrom
          - entity: input_number.rd6030_battery_charge_voltage_v
            name: Soll-Ladespannung
          - entity: input_number.rd6030_battery_max_charge_current_a
            name: Maximaler Ladestrom
          - entity: input_number.rd6030_battery_current_step_a
            name: Stromschritt
          - entity: input_number.rd6030_battery_surplus_deadband_w
            name: Totband gesamt
          - entity: input_number.rd6030_battery_min_output_voltage_v
            name: Min. Spannung fuer Berechnung
          - entity: input_number.rd6030_battery_stale_timeout_s
            name: Messwert-Timeout

      - type: entities
        title: RD6030 Ueberschussladen Diagnose
        show_header_toggle: false
        state_color: true
        entities:
          - entity: sensor.rd6030_reglerstatus
            name: RD6030 Status
          - entity: sensor.rd6030_ueberschuss_mittelwert
            name: Ueberschuss Mittelwert
          - entity: sensor.rd6030_netzleistung_mittelwert
            name: Netzleistung Mittelwert
          - entity: sensor.rd6030_naechster_zielstrom
            name: Naechster Zielstrom
          - entity: sensor.rd6030_output_voltage
            name: Ausgangsspannung
          - entity: sensor.rd6030_output_current
            name: Ausgangsstrom
          - entity: binary_sensor.rd6030_messwert_frisch
            name: Messwert frisch
          - entity: binary_sensor.rd6030_im_totband
            name: Im Totband
          - entity: binary_sensor.rd6030_am_stromlimit
            name: Am Stromlimit
          - entity: binary_sensor.rd6030_spannung_zu_hoch
            name: Spannung zu hoch
