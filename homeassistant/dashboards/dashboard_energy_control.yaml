title: Energie Monitor
views:
  - title: Energie Monitor
    path: energie-steuerung
    icon: mdi:transmission-tower
    cards:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.electric_meter_ir_active_power
            name: Netzleistung
            min: -2000
            max: 4000
            severity:
              green: -2000
              yellow: 10
              red: 500
          - type: gauge
            entity: sensor.opendtu_91fd98_ac_power
            name: PV-Leistung
            min: 0
            max: 3000
            severity:
              green: 0
              yellow: 1200
              red: 2400
          - type: gauge
            entity: sensor.smartshunt_300a_id_279_batterieleistung
            name: Batterie/WR-Leistung
            min: -3000
            max: 3000
            severity:
              green: -3000
              yellow: 10
              red: 2000
          - type: tile
            entity: sensor.smartshunt_300a_id_279_batterieladung
            name: Batterie SOC
            color: primary
          - type: tile
            entity: sensor.temperature_battery_temperatur
            name: Batterie Temperatur
            color: primary

      - type: entities
        title: Energie Diagnose
        show_header_toggle: false
        state_color: true
        entities:
          - entity: sensor.electric_meter_ir_active_power
            name: Netzleistung
          - entity: sensor.grid_power_average
            name: Netzleistung Mittelwert
          - entity: sensor.opendtu_91fd98_ac_power
            name: PV-Leistung
          - entity: sensor.smartshunt_300a_id_279_batterieleistung
            name: Batterie/WR-Leistung
          - entity: sensor.smartshunt_300a_id_279_batterieladung
            name: Batterie SOC
          - entity: sensor.temperature_battery_temperatur
            name: Batterie Temperatur

      - type: history-graph
        title: Leistung letzte 2 Stunden
        hours_to_show: 2
        refresh_interval: 30
        entities:
          - entity: sensor.electric_meter_ir_active_power
            name: Netz
          - entity: sensor.opendtu_91fd98_ac_power
            name: PV
          - entity: sensor.smartshunt_300a_id_279_batterieleistung
            name: Batterie/WR
