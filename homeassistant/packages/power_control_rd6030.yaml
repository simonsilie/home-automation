# Überschussladung RD6030W – gegenseitiger Ausschluss mit Soyosource GTN (Home Assistant Paket)
#
# Einbinden (configuration.yaml):
#   homeassistant:
#     packages: !include_dir_named packages/
# Diese Datei nach <config>/packages/power_control_rd6030.yaml kopieren.
#
# Secrets in secrets.yaml:
#   rd6030w_host: <IP des Wi-Fi-Dongles / riden-dongle>
#
# Modbus-Register: RD60xx-üblich (Spannung/Strom Soll 8/9, Ist 10/11, Ausgang 18).
# Andere Firmware / Dongle: Adressen & Skalierung in der Modbus-Sektion anpassen.
#
# --- Konzept: gegenseitiger Ausschluss ---
# Soyosource GTN (DC->AC, Batterie->Netz) und RD6030W (AC->DC, Netz->Batterie via MPPT) teilen
# dieselbe Batterie. Gleichzeitiger Betrieb wäre ein sinnloser Kreislauf:
#   Netz -> RD6030W -> Batterie -> Soyosource -> Netz
# Daher gilt:
#   1. PV-Überschuss erkannt (Netz exportiert UND Soyosource-Sollleistung < 20 W):
#      -> Soyosource auf max = 0 sperren, RD6030W lädt den Überschuss über den Victron MPPT.
#   2. Kein Überschuss (Import oder Soyosource noch aktiv):
#      -> RD6030W runterrampen und abschalten, Soyosource Normalleistung wiederherstellen.
#
# Warum "Soyosource < 20 W" als Startsignal?
# Bei PV-Überschuss reduziert der Soyosource-virtuelle-Zähler die Sollleistung selbstständig
# auf ~0 (kein Bedarf zum Einspeisen). Erst dann ist sichergestellt, dass der Netz-Export
# wirklich aus dem Balkonkraftwerk stammt und nicht vom Wechselrichter selbst.
#
# Zähler: sensor.stromzaehler_ir_wirkleistung (positiv = Bezug, negativ = Einspeisung)
# Soyosource: sensor.soyosource_victron_esp32_limiter_sollleistung,
#             number.soyosource_victron_esp32_maximale_sollleistung
#
# Sicherheit / Elektrik:
# - Victron MPPT 100/20: maximal 20 A Ladestrom. Da der RD6030W im Ausgang etwas schwanken kann,
#   ist die Obergrenze in diesem Package bewusst auf 19.5 A gesetzt, damit etwas Reserve bleibt.
# - Fuer diesen Usecase bleibt die RD6030-Ausgangsspannung fest auf 60 V; nur der Ladestrom
#   wird dynamisch zwischen 0 und 19.5 A geregelt. MPPT/BMS-Abschaltung weiterhin beachten.
# - RD6030W-DC-Ausgang darf nicht parallel zu echten PV-Modulen am selben MPPT-Eingang
#   betrieben werden (Rückspeisung ins Netzteil vermeiden -- Sperrdiode oder Umschaltung).

input_boolean:
  rd6030_surplus_charge_master:
    name: RD6030 Überschussladen (gegenseitiger Ausschluss Soyosource)
    icon: mdi:battery-charging-high

input_number:
  rd6030_export_deadband_w:
    name: RD6030 Export-Totband
    min: 0
    max: 500
    step: 10
    unit_of_measurement: W
    mode: box
    initial: 10
  rd6030_max_charge_current_a:
    name: RD6030 max. Ladestrom
    min: 0
    max: 19.5
    step: 0.5
    unit_of_measurement: A
    mode: box
    initial: 15
  rd6030_current_step_a:
    name: RD6030 Stromschritt (RAMPE)
    min: 0.1
    max: 5
    step: 0.1
    unit_of_measurement: A
    mode: box
    initial: 0.5
  rd6030_soyosource_restore_max_w:
    name: RD6030 Soyosource Wiederherstellungswert max. Sollleistung
    min: 0
    max: 600
    step: 10
    unit_of_measurement: W
    mode: box
    initial: 600
  rd6030_min_output_voltage_v:
    name: RD6030 min. Ausgangsspannung (I-Berechnung)
    min: 1
    max: 60
    step: 0.5
    unit_of_measurement: V
    mode: box
    initial: 12

modbus:
  - name: rd6030
    type: tcp
    host: !secret rd6030w_host
    port: 502
    message_wait_milliseconds: 30
    timeout: 5
    numbers:
      - name: "RD6030 charge voltage"
        unique_id: rd6030_charge_voltage_set
        slave: 1
        address: 8
        input_type: holding
        data_type: uint16
        min: 0
        max: 60
        step: 0.01
        scale: 0.01
        offset: 0
        precision: 2
        unit_of_measurement: V
        device_class: voltage
      - name: "RD6030 charge current"
        unique_id: rd6030_charge_current_set
        slave: 1
        address: 9
        input_type: holding
        data_type: uint16
        min: 0
        max: 19.5
        step: 0.01
        scale: 0.01
        offset: 0
        precision: 2
        unit_of_measurement: A
        device_class: current
    sensors:
      - name: "RD6030 output voltage"
        unique_id: rd6030_output_voltage_measure
        slave: 1
        address: 10
        input_type: holding
        data_type: uint16
        scale: 0.01
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
      - name: "RD6030 output current"
        unique_id: rd6030_output_current_measure
        slave: 1
        address: 11
        input_type: holding
        data_type: uint16
        scale: 0.01
        unit_of_measurement: A
        device_class: current
        state_class: measurement
    switches:
      - name: "RD6030 output enable"
        unique_id: rd6030_output_enable_switch
        slave: 1
        address: 18
        write_type: holding
        command_on: 1
        command_off: 0
        verify_state: true

template:
  - sensor:
      - name: "Grid export surplus"
        unique_id: power_steuerung_grid_export_surplus
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set p = states('sensor.stromzaehler_ir_wirkleistung') | float(0) %}
          {{ [0.0, 0.0 - p] | max | round(0) }}
        availability: >
          {{ states('sensor.stromzaehler_ir_wirkleistung') not in ['unknown', 'unavailable', 'none', ''] }}

automation:
  - id: power_steuerung_rd6030_follow_surplus
    alias: "RD6030 Überschussladen (gegenseitiger Ausschluss Soyosource)"
    description: >
      Lädt nur bei echtem PV-Überschuss: Netz exportiert UND Soyosource-Sollleistung < 20 W.
      Während RD6030W aktiv ist, wird Soyosource auf max=0 gesperrt (gegenseitiger Ausschluss).
      Bei fehlendem Überschuss: RD6030W runterrampen, Soyosource Normalleistung wiederherstellen.
      Sicherheit: sofortiger Stopp wenn Ausgangsspannung über max. Ladespannung.
    mode: restart
    trigger:
      - trigger: time_pattern
        seconds: "/30"
    action:
      - choose:
          # Master aus: alles abschalten, Soyosource freigeben
          - conditions:
              - condition: state
                entity_id: input_boolean.rd6030_surplus_charge_master
                state: "off"
            sequence:
              - service: number.set_value
                target:
                  entity_id: number.rd6030_charge_voltage
                data:
                  value: 60
              - service: number.set_value
                target:
                  entity_id: number.rd6030_charge_current
                data:
                  value: 0
              - service: switch.turn_off
                target:
                  entity_id: switch.rd6030_output_enable
              - service: number.set_value
                target:
                  entity_id: number.soyosource_victron_esp32_maximale_sollleistung
                data:
                  value: "{{ states('input_number.rd6030_soyosource_restore_max_w') | float(600) }}"
        default:
          - variables:
              fixed_v: 60
              export_w: "{{ states('sensor.grid_export_surplus') | float(0) }}"
              deadband: "{{ states('input_number.rd6030_export_deadband_w') | float(10) }}"
              max_a: "{{ states('input_number.rd6030_max_charge_current_a') | float(15) }}"
              step_a: "{{ states('input_number.rd6030_current_step_a') | float(0.5) }}"
              v_min: "{{ states('input_number.rd6030_min_output_voltage_v') | float(12) }}"
              v_meas: "{{ states('sensor.rd6030_output_voltage') | float(12) }}"
              v_safe: "{{ [v_meas | float(12), v_min | float(12)] | max }}"
              cur: "{{ states('number.rd6030_charge_current') | float(0) }}"
              soy_demand: "{{ states('sensor.soyosource_victron_esp32_limiter_sollleistung') | float(0) }}"
              restore_max: "{{ states('input_number.rd6030_soyosource_restore_max_w') | float(600) }}"
              # Soyosource gilt als "aus" wenn virtuelle Sollleistung < 20 W
              soy_off: "{{ soy_demand < 20 }}"
          - service: number.set_value
            target:
              entity_id: number.rd6030_charge_voltage
            data:
              value: "{{ fixed_v }}"
          - choose:
              # Sicherheitsabschaltung: Batterie-/MPPT-Spannung zu hoch
              - conditions:
                  - condition: template
                    value_template: "{{ v_meas > fixed_v }}"
                sequence:
                  - service: number.set_value
                    target:
                      entity_id: number.rd6030_charge_current
                    data:
                      value: 0
                  - service: switch.turn_off
                    target:
                      entity_id: switch.rd6030_output_enable
                  - service: number.set_value
                    target:
                      entity_id: number.soyosource_victron_esp32_maximale_sollleistung
                    data:
                      value: "{{ restore_max }}"
              # PV-Überschuss: Grid exportiert UND Soyosource ist nahe 0
              # -> Soyosource sperren, RD6030W auf Überschuss regeln
              - conditions:
                  - condition: template
                    value_template: "{{ export_w >= deadband and soy_off }}"
                sequence:
                  - service: number.set_value
                    target:
                      entity_id: number.soyosource_victron_esp32_maximale_sollleistung
                    data:
                      value: 0
                  - variables:
                      available_w: "{{ export_w - deadband }}"
                      target_a: "{{ (available_w / v_safe) | round(2) }}"
                      target_clamped: "{{ [[target_a | float(0), 0] | max, max_a] | min }}"
                      next_i: >
                        {% set tc = target_clamped | float(0) %}
                        {% set c = cur | float(0) %}
                        {% set s = step_a | float(0.5) %}
                        {% if tc > c %}
                          {{ [[c + s, tc] | min, max_a] | min | round(2) }}
                        {% elif tc < c %}
                          {{ [c - s, tc] | max | round(2) }}
                        {% else %}
                          {{ c | round(2) }}
                        {% endif %}
                  - service: number.set_value
                    target:
                      entity_id: number.rd6030_charge_current
                    data:
                      value: "{{ next_i }}"
                  - if:
                      - condition: template
                        value_template: "{{ next_i > 0 }}"
                    then:
                      - service: switch.turn_on
                        target:
                          entity_id: switch.rd6030_output_enable
                    else:
                      - service: switch.turn_off
                        target:
                          entity_id: switch.rd6030_output_enable
            # Kein PV-Überschuss oder Soyosource noch aktiv:
            # RD6030W runterrampen, bei 0 Soyosource Normalleistung wiederherstellen
            default:
              - variables:
                  next_down: "{{ [(cur | float(0)) - (step_a | float(0.5)), 0] | max | round(2) }}"
              - service: number.set_value
                target:
                  entity_id: number.rd6030_charge_current
                data:
                  value: "{{ next_down }}"
              - if:
                  - condition: template
                    value_template: "{{ next_down <= 0 }}"
                then:
                  - service: switch.turn_off
                    target:
                      entity_id: switch.rd6030_output_enable
                  - service: number.set_value
                    target:
                      entity_id: number.soyosource_victron_esp32_maximale_sollleistung
                    data:
                      value: "{{ restore_max }}"

  - id: power_steuerung_rd6030_master_off_cleanup
    alias: "RD6030 Aus bei Master AUS"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.rd6030_surplus_charge_master
        to: "off"
    action:
      - service: number.set_value
        target:
          entity_id: number.rd6030_charge_voltage
        data:
          value: 60
      - service: number.set_value
        target:
          entity_id: number.rd6030_charge_current
        data:
          value: 0
      - service: switch.turn_off
        target:
          entity_id: switch.rd6030_output_enable
      - service: number.set_value
        target:
          entity_id: number.soyosource_victron_esp32_maximale_sollleistung
        data:
          value: "{{ states('input_number.rd6030_soyosource_restore_max_w') | float(600) }}"
