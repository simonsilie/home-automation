# Home Assistant package: shared energy meter sensors.
#
# Sensors derived from the grid meter that are used by multiple controllers

sensor:
  - platform: statistics
    name: "Grid Power Average"
    unique_id: grid_power_average
    entity_id: sensor.electric_meter_ir_active_power
    state_characteristic: mean
    sampling_size: 20
    max_age:
      seconds: 10
