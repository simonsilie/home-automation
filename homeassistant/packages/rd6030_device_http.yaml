# Home Assistant package: shared RD6030W device entities.
#
# Uses the riden-dongle HTTP/JSON API instead of Modbus TCP
# (pymodbus is incompatible with the ESP8266 modbus-esp8266 bridge).
#
# Preconditions:
# - Home Assistant loads packages from homeassistant/packages/
# - secrets.yaml contains:
#     rd6030w_status_url: "http://<IP>/status"
#     rd6030w_set_v_url:  "http://<IP>/set_v"
#     rd6030w_set_i_url:  "http://<IP>/set_i"
#     rd6030w_toggle_url: "http://<IP>/toggle_out"

# --- Poll all values from /status every 10 seconds ---
rest:
  - resource: !secret rd6030w_status_url
    scan_interval: 30
    timeout: 30
    sensor:
      - name: "RD6030 output voltage"
        unique_id: rd6030_output_voltage_measure
        value_template: "{{ value_json.out_v }}"
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
      - name: "RD6030 output current"
        unique_id: rd6030_output_current_measure
        value_template: "{{ value_json.out_c }}"
        unit_of_measurement: A
        device_class: current
        state_class: measurement
      - name: "RD6030 output power"
        unique_id: rd6030_output_power_measure
        value_template: "{{ (value_json.out_v | float * value_json.out_c | float) | round(2) }}"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
      - name: "RD6030 charge voltage raw"
        unique_id: rd6030_charge_voltage_raw
        value_template: "{{ value_json.set_v }}"
        unit_of_measurement: V
      - name: "RD6030 charge current raw"
        unique_id: rd6030_charge_current_raw
        value_template: "{{ value_json.set_c }}"
        unit_of_measurement: A
    binary_sensor:
      - name: "RD6030 output on"
        unique_id: rd6030_output_on_state
        value_template: "{{ value_json.out_on }}"
        device_class: power

# --- Writable number and switch entities ---
template:
  - number:
      - name: "RD6030 charge voltage"
        unique_id: rd6030_charge_voltage_set
        availability: "{{ states('sensor.rd6030_charge_voltage_raw') | is_number }}"
        state: "{{ states('sensor.rd6030_charge_voltage_raw') | float(0) }}"
        min: 0
        max: 60
        step: 0.01
        unit_of_measurement: V
        device_class: voltage
        set_value:
          - action: rest_command.rd6030_set_voltage
            data:
              voltage: "{{ value }}"
      - name: "RD6030 charge current"
        unique_id: rd6030_charge_current_set
        availability: "{{ states('sensor.rd6030_charge_current_raw') | is_number }}"
        state: "{{ states('sensor.rd6030_charge_current_raw') | float(0) }}"
        min: 0
        max: 30
        step: 0.01
        unit_of_measurement: A
        device_class: current
        set_value:
          - action: rest_command.rd6030_set_current
            data:
              current: "{{ value }}"
  - switch:
      - name: "RD6030 output enable"
        unique_id: rd6030_output_enable_switch
        availability: "{{ states('binary_sensor.rd6030_output_on') in ['on', 'off'] }}"
        state: "{{ is_state('binary_sensor.rd6030_output_on', 'on') }}"
        turn_on:
          - action: rest_command.rd6030_toggle_output
        turn_off:
          - action: rest_command.rd6030_toggle_output

# --- REST commands for writing to the device ---
rest_command:
  rd6030_set_voltage:
    url: !secret rd6030w_set_v_url
    method: POST
    content_type: text/plain
    payload: "{{ voltage }}"
    timeout: 30

  rd6030_set_current:
    url: !secret rd6030w_set_i_url
    method: POST
    content_type: text/plain
    payload: "{{ current }}"
    timeout: 30

  rd6030_toggle_output:
    url: !secret rd6030w_toggle_url
    method: GET
    timeout: 30
