# Home Assistant package: RD6030 surplus battery charging.
#
# Charges the battery via the Riden RD6030 PSU whenever there is surplus
# power on the grid, i.e. more is being exported than consumed.
#
# Control law
# -----------
# surplus = -(avg_grid_power - mppt_panel_power)
# target_power = clamp(surplus, 0, 540)   [W]
# target_current = target_power / 60      [A]  (constant 60 V)
#
# The controller is only active when the Soyosource inverter is idle
# (limiter_power_demand == 0).

# ── Enable / Disable toggle ────────────────────────────────────────────
input_boolean:
  rd6030_surplus_charge_enabled:
    name: "RD6030 Ueberschussladen aktiv"
    icon: mdi:battery-charging

# ── Averaged grid power (statistics platform) ──────────────────────────
sensor:
  - platform: statistics
    name: "RD6030 Netzleistung Mittelwert"
    unique_id: rd6030_netzleistung_mittelwert
    entity_id: sensor.electric_meter_ir_active_power
    state_characteristic: mean
    sampling_size: 20
    max_age:
      seconds: 15

# ── Calculated template sensors ────────────────────────────────────────
template:
  - sensor:
      - name: "RD6030 Ueberschussleistung"
        unique_id: rd6030_ueberschussleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set grid_avg = states('sensor.rd6030_netzleistung_mittelwert') | float(0) %}
          {% set mppt = states('sensor.soyosource_victron_esp32_mppt_panel_power') | float(0) %}
          {% set surplus = -(grid_avg + 5 - mppt) %}
          {{ [[surplus, 0] | max, 540] | min | round(0) }}

      - name: "RD6030 Zielstrom"
        unique_id: rd6030_zielstrom
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        state: >
          {{ (states('sensor.rd6030_ueberschussleistung') | float(0) / 60) | round(2) }}

      - name: "RD6030 Reglerstatus"
        unique_id: rd6030_reglerstatus
        state: >
          {% if not is_state('input_boolean.rd6030_surplus_charge_enabled', 'on') %}
            Deaktiviert
          {% elif states('sensor.soyosource_aktive_sollleistung') | float(0) > 0 %}
            Warte auf Soyosource
          {% elif states('sensor.rd6030_ueberschussleistung') | float(0) <= 0 %}
            Kein Ueberschuss
          {% else %}
            Laden {{ states('sensor.rd6030_ueberschussleistung') }} W
          {% endif %}

# ── Main control loop ──────────────────────────────────────────────────
automation:
  - id: rd6030_surplus_charge_loop
    alias: "RD6030 Ueberschussladen Regelschleife"
    mode: restart
    trigger:
      - platform: time_pattern
        seconds: "/15"
      - platform: state
        entity_id: input_boolean.rd6030_surplus_charge_enabled
      - platform: state
        entity_id: sensor.soyosource_aktive_sollleistung
    action:
      # ── Guard: controller disabled ──
      - if:
          - condition: state
            entity_id: input_boolean.rd6030_surplus_charge_enabled
            state: "off"
        then:
          - service: number.set_value
            target:
              entity_id: number.riden_psu_current_set
            data:
              value: 0
          - service: switch.turn_off
            target:
              entity_id: switch.riden_psu_output
          - stop: "Controller disabled"

      # ── Guard: Soyosource is feeding in ──
      - if:
          - condition: numeric_state
            entity_id: sensor.soyosource_aktive_sollleistung
            above: 0
        then:
          - service: number.set_value
            target:
              entity_id: number.riden_psu_current_set
            data:
              value: 0
          - service: switch.turn_off
            target:
              entity_id: switch.riden_psu_output
          - stop: "Soyosource is feeding in"

      # ── Set voltage (always 60 V) ──
      - service: number.set_value
        target:
          entity_id: number.riden_psu_voltage_set
        data:
          value: 60

      # ── Set current from calculated target ──
      - service: number.set_value
        target:
          entity_id: number.riden_psu_current_set
        data:
          value: "{{ states('sensor.rd6030_zielstrom') | float(0) }}"

      # ── Enable / disable PSU output ──
      - if:
          - condition: numeric_state
            entity_id: sensor.rd6030_zielstrom
            above: 0
        then:
          - service: switch.turn_on
            target:
              entity_id: switch.riden_psu_output
        else:
          - service: switch.turn_off
            target:
              entity_id: switch.riden_psu_output
