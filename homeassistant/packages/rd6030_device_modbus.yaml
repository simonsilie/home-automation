# Home Assistant package: shared RD6030W device entities via Modbus TCP.
#
# NOTE: The previous HTTP/JSON version is in rd6030_device_http.yaml.
# pymodbus may be incompatible with some ESP8266 modbus-bridge firmware.
# If Modbus does not work, switch back to the HTTP version.
#
# Preconditions:
# - Home Assistant loads packages from homeassistant/packages/
# - secrets.yaml contains:
#     rd6030w_modbus_host: "192.168.x.x"
#     rd6030w_modbus_port: 8266

# --- Modbus TCP connection ---
modbus:
  - name: rd6030
    type: tcp
    host: !secret rd6030w_modbus_host
    port: !secret rd6030w_modbus_port
    timeout: 30
    sensors:
      # Register 10: output voltage display (scale 0.01 V)
      - name: "RD6030 output voltage"
        unique_id: rd6030_output_voltage_measure
        slave: 1
        address: 10
        input_type: holding
        data_type: uint16
        scale: 0.01
        precision: 2
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scan_interval: 30
      # Register 11: output current display (scale 0.001 A)
      - name: "RD6030 output current"
        unique_id: rd6030_output_current_measure
        slave: 1
        address: 11
        input_type: holding
        data_type: uint16
        scale: 0.001
        precision: 3
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scan_interval: 30
      # Register 12-13: output power display (scale 0.01 W, 32-bit)
      - name: "RD6030 output power"
        unique_id: rd6030_output_power_measure
        slave: 1
        address: 12
        input_type: holding
        data_type: uint32
        count: 2
        scale: 0.01
        precision: 2
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 30
      # Register 8: voltage set value (scale 0.01 V)
      - name: "RD6030 charge voltage raw"
        unique_id: rd6030_charge_voltage_raw
        slave: 1
        address: 8
        input_type: holding
        data_type: uint16
        scale: 0.01
        precision: 2
        unit_of_measurement: V
        scan_interval: 30
      # Register 9: current set value (scale 0.001 A)
      - name: "RD6030 charge current raw"
        unique_id: rd6030_charge_current_raw
        slave: 1
        address: 9
        input_type: holding
        data_type: uint16
        scale: 0.001
        precision: 3
        unit_of_measurement: A
        scan_interval: 30
      # Register 5: internal temperature °C
      - name: "RD6030 temperature"
        unique_id: rd6030_temperature_measure
        slave: 1
        address: 5
        input_type: holding
        data_type: uint16
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        scan_interval: 60
    binary_sensors:
      # Register 18: output enable (0 = off, 1 = on)
      - name: "RD6030 output on"
        unique_id: rd6030_output_on_state
        slave: 1
        address: 18
        input_type: holding
        device_class: power
        scan_interval: 30

# --- Writable number and switch entities ---
template:
  - number:
      - name: "RD6030 charge voltage"
        unique_id: rd6030_charge_voltage_set
        availability: "{{ states('sensor.rd6030_charge_voltage_raw') | is_number }}"
        state: "{{ states('sensor.rd6030_charge_voltage_raw') | float(0) }}"
        min: 0
        max: 60
        step: 0.01
        unit_of_measurement: V
        device_class: voltage
        set_value:
          - action: modbus.write_register
            data:
              hub: rd6030
              slave: 1
              address: 8
              value: "{{ (value * 100) | int }}"
      - name: "RD6030 charge current"
        unique_id: rd6030_charge_current_set
        availability: "{{ states('sensor.rd6030_charge_current_raw') | is_number }}"
        state: "{{ states('sensor.rd6030_charge_current_raw') | float(0) }}"
        min: 0
        max: 30
        step: 0.01
        unit_of_measurement: A
        device_class: current
        set_value:
          - action: modbus.write_register
            data:
              hub: rd6030
              slave: 1
              address: 9
              value: "{{ (value * 1000) | int }}"
  - switch:
      - name: "RD6030 output enable"
        unique_id: rd6030_output_enable_switch
        availability: "{{ states('binary_sensor.rd6030_output_on') in ['on', 'off'] }}"
        state: "{{ is_state('binary_sensor.rd6030_output_on', 'on') }}"
        turn_on:
          - action: modbus.write_register
            data:
              hub: rd6030
              slave: 1
              address: 18
              value: 1
        turn_off:
          - action: modbus.write_register
            data:
              hub: rd6030
              slave: 1
              address: 18
              value: 0
