# Home Assistant package: feed-in control for Soyosource in manual mode.
#
# Together with rd6030_battery_surplus_charge.yaml this replaces the old
# combined package power_control_rd6030.yaml.
#
# Preconditions:
# - Home Assistant loads packages from homeassistant/packages/
# - The ESPHome entities from electric_meter_ir.yaml and soyosource-victron-esp32.yaml exist
# - switch.soyosource_victron_esp32_limiter_manual_mode stays enabled while this controller is active
# - Mutual exclusion with RD6030 surplus charging is handled through controller state.
#   Soyosource stays at 0 W while RD6030 is actively charging.

input_boolean:
  soyosource_feed_in_control_enabled:
    name: Soyosource Einspeiseregelung aktiv
    icon: mdi:transmission-tower-export

  soyosource_feed_in_fail_safe_zero:
    name: Soyosource Regler auf 0 W bei Messfehler
    icon: mdi:shield-alert-outline

input_text:
  soyosource_feed_in_meter_entity:
    name: Soyosource Zaehler Entity
    icon: mdi:meter-electric-outline
    initial: sensor.electric_meter_ir_active_power
    max: 255

input_number:
  soyosource_feed_in_target_power:
    name: Soyosource Netzleistungsziel
    icon: mdi:target
    min: -200
    max: 200
    step: 1
    unit_of_measurement: W
    mode: box
    initial: 0

  soyosource_feed_in_deadband:
    # Total deadband width around the target, e.g. 10 W = +/- 5 W.
    name: Soyosource Totband gesamt
    icon: mdi:arrow-expand-horizontal
    min: 0
    max: 200
    step: 5
    unit_of_measurement: W
    mode: slider
    initial: 10

  soyosource_feed_in_max_step:
    name: Soyosource Maximaler Stellschritt
    icon: mdi:stairs
    min: 10
    max: 400
    step: 10
    unit_of_measurement: W
    mode: slider
    initial: 150

  soyosource_feed_in_stale_timeout:
    name: Soyosource Messwert Timeout
    icon: mdi:timer-alert-outline
    min: 15
    max: 300
    step: 5
    unit_of_measurement: s
    mode: box
    initial: 60

sensor:
  - platform: statistics
    name: Soyosource Netzleistung Mittelwert
    unique_id: soyosource_netzleistung_mittelwert
    entity_id: sensor.electric_meter_ir_active_power
    state_characteristic: mean
    max_age:
      seconds: 15
    sampling_size: 20

template:
  - sensor:
      - name: Soyosource Netzleistung Direkt
        unique_id: soyosource_netzleistung_direkt
        icon: mdi:transmission-tower
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {% set meter_entity = states('input_text.soyosource_feed_in_meter_entity') | trim %}
          {{ meter_entity != '' and states(meter_entity) not in ['unknown', 'unavailable', 'none', ''] }}
        state: >
          {% set meter_entity = states('input_text.soyosource_feed_in_meter_entity') | trim %}
          {{ states(meter_entity) | float(0) | round(0) }}

      - name: Soyosource Aktive Sollleistung
        unique_id: soyosource_aktive_sollleistung
        icon: mdi:flash
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{ (
               is_state('switch.soyosource_victron_esp32_limiter_manual_mode', 'on')
               and states('number.soyosource_victron_esp32_manual_power_demand') not in ['unknown', 'unavailable', 'none']
             ) or (
               not is_state('switch.soyosource_victron_esp32_limiter_manual_mode', 'on')
               and states('sensor.soyosource_victron_esp32_limiter_power_demand') not in ['unknown', 'unavailable', 'none']
             ) }}
        state: >
          {% if is_state('switch.soyosource_victron_esp32_limiter_manual_mode', 'on') %}
            {{ states('number.soyosource_victron_esp32_manual_power_demand') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.soyosource_victron_esp32_limiter_power_demand') | float(0) | round(0) }}
          {% endif %}

      - name: Soyosource Regeldifferenz
        unique_id: soyosource_regeldifferenz
        icon: mdi:delta
        unit_of_measurement: W
        state_class: measurement
        availability: >
         {{ states('sensor.soyosource_netzleistung_mittelwert') not in ['unknown', 'unavailable', 'none']
           or states('sensor.soyosource_netzleistung_direkt') not in ['unknown', 'unavailable', 'none'] }}
        state: >
          {% set averaged = states('sensor.soyosource_netzleistung_mittelwert') %}
          {% set actual = averaged | float(0)
             if averaged not in ['unknown', 'unavailable', 'none']
           else states('sensor.soyosource_netzleistung_direkt') | float(0) %}
          {% set target = states('input_number.soyosource_feed_in_target_power') | float(0) %}
          {{ (actual - target) | round(0) }}

      - name: Soyosource Naechste Sollleistung
        unique_id: soyosource_naechste_sollleistung
        icon: mdi:flash-triangle-outline
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{ states('number.soyosource_victron_esp32_manual_power_demand') not in ['unknown', 'unavailable', 'none']
             and states('number.soyosource_victron_esp32_max_power_demand') not in ['unknown', 'unavailable', 'none']
             and states('sensor.soyosource_regeldifferenz') not in ['unknown', 'unavailable', 'none'] }}
        state: >
          {% set current = states('number.soyosource_victron_esp32_manual_power_demand') | float(0) %}
          {% set error = states('sensor.soyosource_regeldifferenz') | float(0) %}
          {% set deadband = (states('input_number.soyosource_feed_in_deadband') | float(0)) / 2 %}
          {% set max_step = states('input_number.soyosource_feed_in_max_step') | float(0) %}
          {% set max_power = states('number.soyosource_victron_esp32_max_power_demand') | float(900) %}
          {% if abs(error) <= deadband %}
            {{ current | round(0) }}
          {% else %}
            {% if error > 0 %}
              {% set correction = [error, max_step] | min %}
            {% else %}
              {% set correction = [error, -max_step] | max %}
            {% endif %}
            {% set requested = current + correction %}
            {{ [0, [requested, max_power] | min] | max | round(0) }}
          {% endif %}

      - name: Soyosource Reglerstatus
        unique_id: soyosource_reglerstatus
        icon: mdi:information-outline
        state: >
          {% set enabled = is_state('input_boolean.soyosource_feed_in_control_enabled', 'on') %}
          {% set fresh = is_state('binary_sensor.soyosource_messwert_frisch', 'on') %}
          {% set manual = is_state('switch.soyosource_victron_esp32_limiter_manual_mode', 'on') %}
          {% set error = states('sensor.soyosource_regeldifferenz') | float(0) %}
          {% set deadband = (states('input_number.soyosource_feed_in_deadband') | float(0)) / 2 %}
          {% set at_max = is_state('binary_sensor.soyosource_regler_am_maximum', 'on') %}
          {% set at_min = is_state('binary_sensor.soyosource_regler_am_minimum', 'on') %}
          {% if not enabled %}
            deaktiviert
          {% elif not fresh %}
            Messwert veraltet
          {% elif not manual %}
            Handbetrieb wird aktiviert
          {% elif at_max %}
            am Maximum begrenzt
          {% elif at_min %}
            am Minimum begrenzt
          {% elif abs(error) <= deadband %}
            im Totband
          {% elif error > 0 %}
            Leistung erhoehen
          {% else %}
            Leistung senken
          {% endif %}

  - binary_sensor:
      - name: Soyosource Messwert Frisch
        unique_id: soyosource_messwert_frisch
        icon: mdi:meter-electric
        state: >
          {% set meter_entity = states('input_text.soyosource_feed_in_meter_entity') | trim %}
          {% set meter = expand(meter_entity) | first %}
          {% set timeout = states('input_number.soyosource_feed_in_stale_timeout') | int(60) %}
          {% if meter_entity == '' or meter is none or meter.state in ['unknown', 'unavailable', 'none', ''] %}
            false
          {% else %}
            {% set seen_at = meter.last_reported if meter.last_reported is defined else meter.last_updated %}
            {{ (as_timestamp(now()) - as_timestamp(seen_at)) < timeout }}
          {% endif %}

      - name: Soyosource Regler Im Totband
        unique_id: soyosource_regler_im_totband
        icon: mdi:vector-polyline-minus
        state: >
          {% set error = states('sensor.soyosource_regeldifferenz') | float(0) %}
          {% set deadband = (states('input_number.soyosource_feed_in_deadband') | float(0)) / 2 %}
          {{ abs(error) <= deadband }}

      - name: Soyosource Regler Am Maximum
        unique_id: soyosource_regler_am_maximum
        icon: mdi:arrow-collapse-up
        state: >
          {% set setpoint = states('number.soyosource_victron_esp32_manual_power_demand') | float(0) %}
          {% set max_power = states('number.soyosource_victron_esp32_max_power_demand') | float(900) %}
          {% set error = states('sensor.soyosource_regeldifferenz') | float(0) %}
          {% set deadband = (states('input_number.soyosource_feed_in_deadband') | float(0)) / 2 %}
          {{ setpoint >= max_power and error > deadband }}

      - name: Soyosource Regler Am Minimum
        unique_id: soyosource_regler_am_minimum
        icon: mdi:arrow-collapse-down
        state: >
          {% set setpoint = states('number.soyosource_victron_esp32_manual_power_demand') | float(0) %}
          {% set error = states('sensor.soyosource_regeldifferenz') | float(0) %}
          {% set deadband = (states('input_number.soyosource_feed_in_deadband') | float(0)) / 2 %}
          {{ setpoint <= 0 and error < (deadband * -1) }}

      - name: Soyosource Ziel Nicht Erreichbar
        unique_id: soyosource_ziel_nicht_erreichbar
        icon: mdi:alert-circle-outline
        state: >
          {{ is_state('binary_sensor.soyosource_regler_am_maximum', 'on')
             or is_state('binary_sensor.soyosource_regler_am_minimum', 'on') }}

automation:
  - id: soyosource_feed_in_control_loop
    alias: Soyosource Einspeiseregelung
    description: Regelt die manuelle Soyosource-Sollleistung anhand der gemittelten Netzleistung und bleibt bei aktivem RD6030 auf 0 W.
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - sensor.soyosource_netzleistung_mittelwert
          - input_number.soyosource_feed_in_target_power
          - input_number.soyosource_feed_in_deadband
          - input_number.soyosource_feed_in_max_step
          - input_number.soyosource_feed_in_stale_timeout
          - input_boolean.soyosource_feed_in_control_enabled
      - platform: time_pattern
        seconds: "/15"
    condition:
      - condition: state
        entity_id: input_boolean.soyosource_feed_in_control_enabled
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.soyosource_messwert_frisch
                state: "off"
            sequence:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.soyosource_feed_in_fail_safe_zero
                        state: "on"
                    sequence:
                      - service: number.set_value
                        target:
                          entity_id: number.soyosource_victron_esp32_manual_power_demand
                        data:
                          value: 0
              - stop: Messwert ist veraltet oder nicht verfuegbar.

      - if:
          - condition: state
            entity_id: switch.soyosource_victron_esp32_limiter_manual_mode
            state: "off"
        then:
          - service: switch.turn_on
            target:
              entity_id: switch.soyosource_victron_esp32_limiter_manual_mode

      - variables:
          current_setpoint: >
            {{ states('number.soyosource_victron_esp32_manual_power_demand') | float(0) }}
          error_w: >
            {% set averaged = states('sensor.soyosource_netzleistung_mittelwert') %}
            {% set actual = averaged | float(0)
               if averaged not in ['unknown', 'unavailable', 'none']
               else states('sensor.soyosource_netzleistung_direkt') | float(0) %}
            {% set target = states('input_number.soyosource_feed_in_target_power') | float(0) %}
            {{ (actual - target) | round(0) }}
          deadband_w: >
            {{ (states('input_number.soyosource_feed_in_deadband') | float(0)) / 2 }}
          max_step_w: >
            {{ states('input_number.soyosource_feed_in_max_step') | float(0) }}
          max_power_w: >
            {{ states('number.soyosource_victron_esp32_max_power_demand') | float(900) }}
          rd6030_current_a: >
            {{ states('number.rd6030_charge_current') | float(0) }}
          rd6030_output_enabled: >
            {{ is_state('switch.rd6030_output_enable', 'on') }}
          rd6030_active: >
            {{ rd6030_output_enabled or (rd6030_current_a | float(0) > 0) }}

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ rd6030_active }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ current_setpoint | float(0) > 0 }}"
                then:
                  - service: number.set_value
                    target:
                      entity_id: number.soyosource_victron_esp32_manual_power_demand
                    data:
                      value: 0
              - stop: RD6030 verbraucht den Ueberschuss.

      - condition: template
        value_template: "{{ abs(error_w | float(0)) > (deadband_w | float(0)) }}"

      - variables:
          correction_w: >
            {% if error_w | float(0) > 0 %}
              {{ [error_w | float(0), max_step_w | float(0)] | min }}
            {% else %}
              {{ [error_w | float(0), -(max_step_w | float(0))] | max }}
            {% endif %}
          next_setpoint: >
            {% set requested = (current_setpoint | float(0)) + (correction_w | float(0)) %}
            {{ [0, [requested, max_power_w | float(900)] | min] | max | round(0) }}

      - condition: template
        value_template: "{{ next_setpoint | float != current_setpoint | float }}"

      - service: number.set_value
        target:
          entity_id: number.soyosource_victron_esp32_manual_power_demand
        data:
          value: "{{ next_setpoint | float(0) }}"

  - id: soyosource_feed_in_manual_mode_sync
    alias: Soyosource Handbetrieb fuer HA-Regler
    description: Aktiviert den Handbetrieb automatisch, solange der HA-Regler eingeschaltet ist.
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.soyosource_feed_in_control_enabled
        to: "on"
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.soyosource_victron_esp32_limiter_manual_mode

  - id: soyosource_feed_in_disable_zero
    alias: Soyosource Regler aus -> 0 W
    description: Setzt die manuelle Sollleistung beim Deaktivieren optional auf 0 W.
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.soyosource_feed_in_control_enabled
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.soyosource_feed_in_fail_safe_zero
        state: "on"
    action:
      - service: number.set_value
        target:
          entity_id: number.soyosource_victron_esp32_manual_power_demand
        data:
          value: 0
