[mqtt]
host = HOME_ASSISTANT_IP
port = 1883
username = mqtt
password = CHANGE_ME
topic_prefix = electric-meter-ir
keepalive = 60

[grid_meter]
service_name = com.victronenergy.grid.mqtt_ir_grid_meter
device_instance = 40
product_name = MQTT IR Grid Meter
custom_name = Electric Meter IR
stale_seconds = 90

# Victron grid meter convention is usually positive import, negative export.
# Set to -1 if the Cerbo shows import/export reversed.
power_multiplier = 1
