# ESPHome: one ESP32 -> RS485 (Soyosource GTN limiter) + VE.Direct (Victron MPPT + SmartShunt)
#
# Sources / components:
#   - Soyosource: github.com/syssi/esphome-soyosource-gtn-virtual-meter (RS485 4800 baud)
#   - Victron: github.com/KinDR007/VictronMPPT-ESPHOME (VE.Direct 19200 baud)
#
# Supported inverters include: GTN-*LIM* with RS485 (see syssi README).
#
# --- RS485 to the Soyosource (typically HW-0519 / MAX485 module) ---
#   - Inverter A/B <-> module A/B (swap polarity if it fails)
#   - Module GND <-> ESP GND (keep a clean common reference with the DC system)
#   - Power module VCC with 3.3 V (TTL levels to the ESP are then 3.3 V - see syssi README)
#   - Module TX/RX <-> RS485-TX/RS485-RX as substituted below
#   - DE/RE: many breakout boards tie DE+RE together; without automatic flow control
#     tie them to send (check the board circuit). syssi optional: flow_control_pin
#
# --- Victron VE.Direct (JST-PH) - two devices, one UART each ---
#   MPPT (${pin_ve_rx}) and SmartShunt (${pin_shunt_rx}): same wiring per device:
#   - GND <-> GND
#   - Victron TX -> ESP RX (respective pin); Victron RX unused (read-only sniffing)
#   - Do not power the ESP from VE.Direct 5V (current too low)
#   - TX level 3.3 V or 5 V - with 5 V use level shifting / divider (Victron FAQ)
#
# Home Assistant: set the entity for house grid power in the substitutions below.

substitutions:
  device_name: soyosource-victron-esp32
  friendly_name: Soyosource Victron ESP32
  # ESP32-S3: two UARTs for RS485 (MAX485) and VE.Direct - avoid USB/JTAG pins 19/20 and invalid GPIOs
  pin_rs485_tx: GPIO17
  pin_rs485_rx: GPIO16
  pin_ve_rx: GPIO4
  pin_shunt_rx: GPIO5
  # Power at the grid connection point (W), negative = feed-in - for soyosource_virtual_meter
  # Default: IR meter device (electric_meter_ir.yaml, device_name electric-meter-ir) -> sensor.electric_meter_ir_active_power
  homeassistant_power_entity: sensor.electric_meter_ir_active_power
  # HA power averaging window = soyosource_virtual_meter cycle (no control every 3s with data every 15s)
  grid_power_average_interval: 15s
  # Maximum feed-in power of the Soyosource GTN in watts
  max_inverter_power: "600"
  external_components_soyosource: github://syssi/esphome-soyosource-gtn-virtual-meter@main
  external_components_victron: github://KinDR007/VictronMPPT-ESPHOME@main

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: Soyosource GTN limiter via RS485, Victron MPPT and SmartShunt via VE.Direct on one ESP32.
  min_version: 2024.6.0
  project:
    name: simon.soyosource-victron-esp32
    version: "1.0"

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_soyosource}
    refresh: 0s
  - source: ${external_components_victron}
    refresh: 0s

packages:
  base: !include common/base.yaml

logger:
  level: INFO

uart:
  - id: uart_rs485
    baud_rate: 4800
    tx_pin: ${pin_rs485_tx}
    rx_pin: ${pin_rs485_rx}
  - id: uart_victron
    baud_rate: 19200
    # VE.Direct is only sniffed passively here: Victron TX -> ESP RX only.
    rx_pin: ${pin_ve_rx}
    rx_buffer_size: 256
  - id: uart_smartshunt
    baud_rate: 19200
    # VE.Direct SmartShunt: Victron TX -> ESP RX only.
    rx_pin: ${pin_shunt_rx}
    rx_buffer_size: 256

soyosource_modbus:
  - id: modbus_soyo
    uart_id: uart_rs485
    name: inverter

soyosource_virtual_meter:
  - id: virtual_meter_soyo
    soyosource_modbus_id: modbus_soyo
    power_id: powermeter0
    power_sensor_inactivity_timeout: 45s
    power_demand_calculation: NEGATIVE_MEASUREMENTS_REQUIRED
    min_power_demand: 0
    max_power_demand: ${max_inverter_power}
    zero_output_on_min_power_demand: true
    power_demand_divider: 1
    buffer: 10
    # Soyosource expects regular frames; at 15s a single lost packet causes a failure.
    # 3s is safe and does not meaningfully load the bus (8 bytes @ 4800 baud = ~17ms).
    update_interval: 3s

# Purple mainboard (STC8-2022-218) does not answer RS485 status requests (0x24...).
# soyosource_inverter therefore removed entirely - avoids unnecessary polling on the bus.

victron:
  - id: victron_mppt
    uart_id: uart_victron
    throttle: 5s
  - id: victron_smartshunt
    uart_id: uart_smartshunt
    throttle: 5s

binary_sensor:
  - platform: status
    name: Connection

number:
  - platform: soyosource_virtual_meter
    soyosource_virtual_meter_id: virtual_meter_soyo
    buffer:
      name: Limiter Buffer
      initial_value: 10
      restore_value: true
    manual_power_demand:
      name: Manual Power Demand
      max_value: ${max_inverter_power}
    max_power_demand:
      name: Max Power Demand
      initial_value: ${max_inverter_power}
      max_value: ${max_inverter_power}
      restore_value: true
    # Splits the power demand across N inverters (1 = one inverter, no split)
    power_demand_divider:
      name: Power Demand Divider
      initial_value: 1
      restore_value: true

sensor:
  - platform: homeassistant
    id: powermeter0
    entity_id: ${homeassistant_power_entity}
    internal: true
    filters:
      - throttle_average: ${grid_power_average_interval}

  - platform: soyosource_virtual_meter
    soyosource_virtual_meter_id: virtual_meter_soyo
    power_demand:
      name: Limiter Power Demand
      id: soyo_power_demand

  - platform: victron
    victron_id: victron_mppt
    panel_voltage:
      name: MPPT Panel Voltage
    panel_power:
      name: MPPT Panel Power
    battery_voltage:
      name: MPPT Battery Voltage
    battery_current:
      name: MPPT Battery Current
    instantaneous_power:
      name: MPPT Battery Power
    yield_today:
      name: MPPT Yield Today
    yield_total:
      name: MPPT Yield Total

  - platform: victron
    victron_id: victron_smartshunt
    battery_voltage:
      name: Shunt Battery Voltage
    battery_current:
      name: Shunt Battery Current
    instantaneous_power:
      name: Shunt Battery Power
    state_of_charge:
      name: Shunt State of Charge
    consumed_amp_hours:
      name: Shunt Consumed Amp Hours
    time_to_go:
      name: Shunt Time to Go
    auxiliary_battery_voltage:
      name: Shunt Starter Battery Voltage
    min_battery_voltage:
      name: Shunt Min Battery Voltage
    max_battery_voltage:
      name: Shunt Max Battery Voltage
    amount_of_discharged_energy:
      name: Shunt Discharged Energy
    amount_of_charged_energy:
      name: Shunt Charged Energy

  # Estimated Soyosource energy from power_demand (no physical meter)
  - platform: total_daily_energy
    name: Soyosource Energy Today
    power_id: soyo_power_demand
    unit_of_measurement: kWh
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
  - platform: integration
    name: Soyosource Energy Total
    sensor: soyo_power_demand
    time_unit: h
    unit_of_measurement: kWh
    accuracy_decimals: 3
    restore: true
    filters:
      - multiply: 0.001

switch:
  - platform: soyosource_virtual_meter
    soyosource_virtual_meter_id: virtual_meter_soyo
    manual_mode:
      name: Limiter Manual Mode
      restore_mode: RESTORE_DEFAULT_ON
    emergency_power_off:
      name: Limiter Emergency Off
      restore_mode: RESTORE_DEFAULT_OFF

time:
  - platform: homeassistant
    id: ha_time

text_sensor:
  - platform: version
    name: ESPHome Version
  - platform: wifi_info
    ip_address:
      name: IP Address
  - platform: soyosource_virtual_meter
    soyosource_virtual_meter_id: virtual_meter_soyo
    operation_mode:
      name: Limiter Operation Mode
  - platform: victron
    victron_id: victron_mppt
    charging_mode:
      name: MPPT Charging Mode
    error:
      name: MPPT Error
    tracking_mode:
      name: MPPT MPP Tracking
