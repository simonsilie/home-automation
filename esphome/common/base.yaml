# Shared base configuration for all ESPHome devices in this repository.
# Included from the device YAMLs via: packages: base: !include common/base.yaml
#
# Expects these substitutions in the including device config: device_name
# Expects these secrets in secrets.yaml:
#   wifi_ssid, wifi_password, api_encryption_key, ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    # SSID max. 32 characters (ESP8266/ESP32 AP limit) - " Fallback" does not fit
    # for the longest device name (soyosource-victron-esp32 = 24 chars).
    ssid: "${device_name} Setup"
    password: !secret ota_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80
