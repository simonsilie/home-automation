# ESPHome: IR-Lesekopf (z. B. Hichi) → UART → SML-Stromzähler → Home Assistant (ESP8266)
#
# Voraussetzung: Der Zähler sendet SML über die optische Schnittstelle (typisch bei
# modernen eHZ). Bei reinem IEC 62056-21 / Mode-D ist diese YAML nicht passend.
#
# Verkabelung:
#   - GND ↔ GND
#   - VCC ↔ 3,3 V (nur wenn der Kopf für 3,3 V ausgelegt ist – sonst 5 V + Pegelanpassung)
#   - Datenleitung vom Kopf RX → RX des ESP (TX am Kopf wird nicht benötigt)
#
# OBIS-Codes / Skalierung: Bei fehlenden Werten oder falschen Zahlen Logger auf DEBUG stellen
# und ESPHome-Log auf OBIS-Zeilen prüfen; „multiply“ ggf. auf 0.0001 o. Ä. anpassen (Zählerabhängig).
#
# Nach dem Flashen in HA: Energy-Dashboard mit Sensor „Bezug Gesamtenergie“ (kWh) verknüpfen.

substitutions:
  device_name: electric-meter-ir
  friendly_name: Electric Meter IR
  # Echte UART0-Konfiguration auf ESP8266: RX0=GPIO3, TX0=GPIO1.
  # Achtung: Logger bleibt auf baud_rate: 0, damit UART0 komplett frei ist.
  pin_rx: GPIO3
  pin_tx: GPIO1
  uart_baud_rate: "9600"
  # Hichi/SML-Lesekoepfe liefern in der Regel 8N1. Falls ein Zaehler 7E1 nutzt
  # (eher bei IEC 62056-21 / Mode-D), muss hier auf EVEN umgestellt werden.
  uart_parity: NONE
  uart_stop_bits: "1"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  project:
    name: simon.electric-meter-ir
    version: "1.0"

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ota_password

captive_portal:

# Standard: Log über USB (UART0). Nutzt du stattdessen GPIO3 als RX für den Zähler: baud_rate: 0 setzen.
logger:
  level: INFO
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

web_server:
  port: 80

uart:
  id: uart_meter
  rx_pin: ${pin_rx}
  tx_pin: ${pin_tx}
  baud_rate: ${uart_baud_rate}
  data_bits: 8
  parity: ${uart_parity}
  stop_bits: ${uart_stop_bits}

# SML ist passiv (nur Empfang). Bei Prüfsummenfehlern in den Logs: UART auf 9600/8N1 probieren.
sml:
  id: sml_meter
  uart_id: uart_meter

sensor:
  - platform: sml
    name: Total Energy Import
    sml_id: sml_meter
    obis_code: "1-0:1.8.0"
    unit_of_measurement: kWh
    accuracy_decimals: 4
    device_class: energy
    state_class: total_increasing
    filters:
      # SML liefert Wh mit Skaler 10^-1 (Bytes 52 FF), Komponente skaliert nicht selbst.
      # 14364 (Rohwert) * 0.0001 = 1.4364 kWh.
      - multiply: 0.0001
  - platform: sml
    name: Total Energy Export
    sml_id: sml_meter
    obis_code: "1-0:2.8.0"
    unit_of_measurement: kWh
    accuracy_decimals: 4
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.0001
  - platform: sml
    name: Active Power
    sml_id: sml_meter
    obis_code: "1-0:16.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: sml
    name: Active Power L1
    sml_id: sml_meter
    obis_code: "1-0:36.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: sml
    name: Active Power L2
    sml_id: sml_meter
    obis_code: "1-0:56.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: sml
    name: Active Power L3
    sml_id: sml_meter
    obis_code: "1-0:76.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: sml
    name: Voltage L1
    sml_id: sml_meter
    obis_code: "1-0:32.7.0"
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    filters:
      # Skaler -1 → V
      - multiply: 0.1
  - platform: sml
    name: Voltage L2
    sml_id: sml_meter
    obis_code: "1-0:52.7.0"
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.1
  - platform: sml
    name: Voltage L3
    sml_id: sml_meter
    obis_code: "1-0:72.7.0"
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.1
  - platform: sml
    name: Current L1
    sml_id: sml_meter
    obis_code: "1-0:31.7.0"
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    filters:
      # Skaler -2 → A
      - multiply: 0.01
  - platform: sml
    name: Current L2
    sml_id: sml_meter
    obis_code: "1-0:51.7.0"
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.01
  - platform: sml
    name: Current L3
    sml_id: sml_meter
    obis_code: "1-0:71.7.0"
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.01
  - platform: sml
    name: Grid Frequency
    sml_id: sml_meter
    obis_code: "1-0:14.7.0"
    unit_of_measurement: Hz
    accuracy_decimals: 1
    device_class: frequency
    state_class: measurement
    filters:
      # Skaler -1 → Hz
      - multiply: 0.1
  - platform: sml
    name: Phase Angle U_L2 U_L1
    sml_id: sml_meter
    obis_code: "1-0:81.7.1"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      # Skaler -1 → Grad
      - multiply: 0.1
  - platform: sml
    name: Phase Angle U_L3 U_L1
    sml_id: sml_meter
    obis_code: "1-0:81.7.2"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      - multiply: 0.1
  - platform: sml
    name: Phase Angle I_L1 U_L1
    sml_id: sml_meter
    obis_code: "1-0:81.7.4"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      - multiply: 0.1
  - platform: sml
    name: Phase Angle I_L2 U_L2
    sml_id: sml_meter
    obis_code: "1-0:81.7.15"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      - multiply: 0.1
  - platform: sml
    name: Phase Angle I_L3 U_L3
    sml_id: sml_meter
    obis_code: "1-0:81.7.26"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      - multiply: 0.1

binary_sensor:
  - platform: status
    name: Connection

text_sensor:
  - platform: version
    name: ESPHome Version
  - platform: wifi_info
    ip_address:
      name: IP Address
  - platform: sml
    name: Meter Number
    sml_id: sml_meter
    obis_code: "1-0:96.1.0"
    format: hex
  - platform: sml
    name: Manufacturer ID
    sml_id: sml_meter
    obis_code: "1-0:96.50.1"
    format: text
  - platform: sml
    name: Firmware Version
    sml_id: sml_meter
    obis_code: "1-0:0.2.0"
    format: text
  - platform: sml
    name: Status Word
    sml_id: sml_meter
    obis_code: "1-0:96.90.2"
    format: hex
    disabled_by_default: true
