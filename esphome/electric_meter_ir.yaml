# ESPHome: IR read head (e.g. Hichi) -> UART -> SML power meter -> Home Assistant (ESP8266)
#
# Requirement: the meter sends SML over its optical interface (typical for modern eHZ
# meters). For plain IEC 62056-21 / Mode D this YAML is not suitable.
#
# Wiring:
#   - GND <-> GND
#   - VCC <-> 3.3 V (only if the head is rated for 3.3 V - otherwise 5 V + level shifting)
#   - Data line from head RX -> RX of the ESP (TX on the head is not needed)
#
# OBIS codes / scaling: if values are missing or wrong, set the logger to DEBUG and check
# the ESPHome log for OBIS lines; adjust "multiply" to 0.0001 or similar if needed
# (meter-dependent).
#
# After flashing, link the "Total Energy Import" sensor (kWh) in the HA Energy dashboard.

substitutions:
  device_name: electric-meter-ir
  friendly_name: Electric Meter IR
  # Real UART0 configuration on ESP8266: RX0=GPIO3, TX0=GPIO1.
  # Attention: logger stays at baud_rate: 0 so UART0 is completely free.
  pin_rx: GPIO3
  pin_tx: GPIO1
  uart_baud_rate: "9600"
  # Hichi/SML read heads usually deliver 8N1. If a meter uses 7E1
  # (more common with IEC 62056-21 / Mode D), switch this to EVEN.
  uart_parity: NONE
  uart_stop_bits: "1"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  project:
    name: simon.electric-meter-ir
    version: "1.0"

esp8266:
  board: d1_mini

packages:
  base: !include common/base.yaml

# Logger on UART0 would clash with the meter, so it stays silent (baud_rate: 0).
logger:
  level: INFO
  baud_rate: 0

# MQTT feed for Venus OS / Cerbo GX bridge. ESPHome API stays enabled for Home Assistant.
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: electric-meter-ir
  discovery: false

uart:
  id: uart_meter
  rx_pin: ${pin_rx}
  tx_pin: ${pin_tx}
  baud_rate: ${uart_baud_rate}
  data_bits: 8
  parity: ${uart_parity}
  stop_bits: ${uart_stop_bits}

# SML is passive (receive only). On checksum errors in the logs: try UART 9600/8N1.
sml:
  id: sml_meter
  uart_id: uart_meter

sensor:
  - platform: sml
    name: Total Energy Import
    sml_id: sml_meter
    obis_code: "1-0:1.8.0"
    unit_of_measurement: kWh
    accuracy_decimals: 4
    device_class: energy
    state_class: total_increasing
    filters:
      # SML delivers Wh with scaler 10^-1 (bytes 52 FF), the component does not scale itself.
      # 14364 (raw value) * 0.0001 = 1.4364 kWh.
      - multiply: 0.0001
  - platform: sml
    name: Total Energy Export
    sml_id: sml_meter
    obis_code: "1-0:2.8.0"
    unit_of_measurement: kWh
    accuracy_decimals: 4
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.0001
  - platform: sml
    name: Active Power
    sml_id: sml_meter
    obis_code: "1-0:16.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: sml
    name: Active Power L1
    sml_id: sml_meter
    obis_code: "1-0:36.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: sml
    name: Active Power L2
    sml_id: sml_meter
    obis_code: "1-0:56.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: sml
    name: Active Power L3
    sml_id: sml_meter
    obis_code: "1-0:76.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: sml
    name: Voltage L1
    sml_id: sml_meter
    obis_code: "1-0:32.7.0"
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    filters:
      # Scaler -1 -> V
      - multiply: 0.1
  - platform: sml
    name: Voltage L2
    sml_id: sml_meter
    obis_code: "1-0:52.7.0"
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.1
  - platform: sml
    name: Voltage L3
    sml_id: sml_meter
    obis_code: "1-0:72.7.0"
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.1
  - platform: sml
    name: Current L1
    sml_id: sml_meter
    obis_code: "1-0:31.7.0"
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    filters:
      # Scaler -2 -> A
      - multiply: 0.01
  - platform: sml
    name: Current L2
    sml_id: sml_meter
    obis_code: "1-0:51.7.0"
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.01
  - platform: sml
    name: Current L3
    sml_id: sml_meter
    obis_code: "1-0:71.7.0"
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.01
  - platform: sml
    name: Grid Frequency
    sml_id: sml_meter
    obis_code: "1-0:14.7.0"
    unit_of_measurement: Hz
    accuracy_decimals: 1
    device_class: frequency
    state_class: measurement
    filters:
      # Scaler -1 -> Hz
      - multiply: 0.1
  - platform: sml
    name: Phase Angle U_L2 U_L1
    sml_id: sml_meter
    obis_code: "1-0:81.7.1"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      # Scaler -1 -> degrees
      - multiply: 0.1
  - platform: sml
    name: Phase Angle U_L3 U_L1
    sml_id: sml_meter
    obis_code: "1-0:81.7.2"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      - multiply: 0.1
  - platform: sml
    name: Phase Angle I_L1 U_L1
    sml_id: sml_meter
    obis_code: "1-0:81.7.4"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      - multiply: 0.1
  - platform: sml
    name: Phase Angle I_L2 U_L2
    sml_id: sml_meter
    obis_code: "1-0:81.7.15"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      - multiply: 0.1
  - platform: sml
    name: Phase Angle I_L3 U_L3
    sml_id: sml_meter
    obis_code: "1-0:81.7.26"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    disabled_by_default: true
    filters:
      - multiply: 0.1

binary_sensor:
  - platform: status
    name: Connection

text_sensor:
  - platform: version
    name: ESPHome Version
  - platform: wifi_info
    ip_address:
      name: IP Address
  - platform: sml
    name: Meter Number
    sml_id: sml_meter
    obis_code: "1-0:96.1.0"
    format: hex
  - platform: sml
    name: Manufacturer ID
    sml_id: sml_meter
    obis_code: "1-0:96.50.1"
    format: text
  - platform: sml
    name: Firmware Version
    sml_id: sml_meter
    obis_code: "1-0:0.2.0"
    format: text
  - platform: sml
    name: Status Word
    sml_id: sml_meter
    obis_code: "1-0:96.90.2"
    format: hex
    disabled_by_default: true
